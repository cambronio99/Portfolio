<!DOCTYPE html>
<html lang="en">
  <head>
    <style>

      @font-face {
        font-family: "akira";
        src: url("../fonts/Akira.otf") format("opentype");
      }

      html {
        height: 100%
      }

      body {
        background-color: black;
      	height: 100vh;
        font-family: akira;
        color: white
      }

      @keyframes gradient {
      	0% {
      		background-position: 0% 50%;
      	}
      	50% {
      		background-position: 100% 50%;
      	}
      	100% {
      		background-position: 0% 50%;
      	}
      }

      ul {
        font-weight:bold;
      }

      #myNavBar ul {
        background: linear-gradient(90deg, #3B3936, #B2BEBF, #889C9B, #486966);
      	background-size: 400% 400%;
      	animation: gradient 15s ease infinite;
        list-style-type: none;
        padding-inline-start: 0px;
        color: white;
        border-radius: 20px;
      }

      #myNavBar ul li:first-child:hover {
        border-radius: 20px 0px 0px 20px
      }

      #myNavBar ul li:last-child:hover {
        border-radius: 0 20px 20px 0;
      }

      #myNavBar ul li {
        display: inline-block;
        padding: 12px 24px;
        text-decoration:none;
      }

      #myNavBar ul li:hover {
        background: #889C9B
      }

      #cta {
        float: right;
      }

      #myNavBar a:-webkit-any-link {
        color: white;
        cursor: pointer;
        text-decoration: none;
      }

      h1 {
        text-align: center;
      }

      #bills th {
        padding: 20px;
      }

      #bills td {
        padding: 20px;
      }

      #bills td:nth-child(1) {
        background-color: #889C9B
      }

      #bills th:nth-child(1) {
        background-color: #889C9B
      }

      #bills th {
        background-color: #3B3936
      }

      #bills td {
        background-color: #3B3936
      }

      .center {
        margin-left: auto;
        margin-right: auto;
      }

      </style>
      <title>mui world</title>
    </head>
  <body>
    <nav id="myNavBar">
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="assignmentBoss.html">Assignments</a></li>
        <li><a href="../Navbar/aboutme.html">About Me</a></li>
        <li id="cta"><a href="../Navbar/signup.html">Sign Up</a></li>
      </ul>
    </nav>
    <table id="bills" class="center">
      <h1>Monthly Bills</h1>
      <tr>
        <th>Bill</th>
        <th>April</th>
        <th>May</th>
        <th>June</th>
      </tr>
      <tr>
        <td><b>Phone</b></td>
        <td>$120</td>
        <td>$140</td>
        <td>$140</td>
      </tr>
      <tr>
        <td><b>Gas</b></td>
        <td>$90</td>
        <td>$100</td>
        <td>$150</td>
      </tr>
      <tr>
        <td><b>Food</b></td>
        <td>$280</td>
        <td>$280</td>
        <td>$300</td>
      </tr>
    </table>
  </body>
</html>
