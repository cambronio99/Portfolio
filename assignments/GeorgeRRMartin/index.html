<!DOCTYPE html>
<html lang="en-US">
  <head>
    <style>

      @font-face {
        font-family: "kingman";
        src: url("../../fonts/Kingman-Regular.otf") format("opentype");
      }

      body {
        background-image: url("../../images/marble.png");
        background-size: 2200px;
        background-repeat: none;
      }

      #lannister {
        width: 10%;
        justify-content: center;
        display: inline;
      }

      h1 {
        font-family: kingman;
        font-size: 90px;
        text-shadow: 0px 5px lightgrey;
        text-align: center;
        display: inline;
      }

      .navbar {
        font-family: kingman;
        text-align: center;
        font-size: 25px;
      }

      .navbar li{
        list-style-type: none;
        display: inline;
        margin: 10px;
      }

      .navbar li a {
        text-decoration: none;
        color: #671F28;
      }

      .flex-container {
        display: flex;
        flex-direction: row;
        margin: 10px;
        justify-content: center;
      }

      #flex-item-left {
        flex: 1;
        border: 5px solid #671F28;
        max-width: 450px;
        margin-right: 40px;
      }

      #flex-item-mid {
        flex: 1;
        border: 5px solid #0D0D0D;
        max-width: 450px;
      }

      #flex-item-right {
        flex: 1;
        border: 5px solid #671F28;
        max-width: 450px;
        margin-left: 40px;
      }

      #fireBlood {
        flex: 1;
        border: 5px solid white;
        max-width: 1450px;
      }



      @media (max-width: 1080px) {
        .flex-container {
          flex-direction: column;
          justify-content: center;
        }

        #flex-item-left {
          margin-left: 200px;
          margin-right: 200px;
          max-width: none;
        }

        #flex-item-mid {
          margin-left: 200px;
          margin-right: 200px;
          max-width: none;
        }

        #flex-item-right {
          margin-left: 200px;
          margin-right: 200px;
          max-width: none;
        }

        #fireBlood {
          height: 300px;
        }

        h1 {
          font-size: 70px;
        }

        #home {
          grid-area: home;
        }

        .navbar {
          display: grid;
          grid-template-areas:
          "home home home"
        }

        .navbar li{
          display: block;
          margin: 25px;
        }


      }

      @media (max-width: 738px) {
        #flex-item-left {
          margin: auto;
        }

        #flex-item-mid {
          margin: auto;
        }

        #flex-item-right {
          margin: auto;
        }

        #fireBlood {
          height: 200px;
        }

        h1 {
          font-size: 50px
        }

        .navbar {
          grid-template-areas:
          "home home";
        }

        .navbar li {
          margin: 15px;
        }

        li a {
          font-size: 25px;
        }
      }




    </style>

    <title>George R.R. Martin</title>
  </head>

  <body>
    <img id="lannister" src="../../images/Lannister.png" alt="Lannister">


    <h1>George R.R. Martin</h1>

    <ul class="navbar">
      <li id="home"><a href="#">Home</a></li>
      <li><a href="#">Not A Blog</a></li>
      <li><a href="#">About George</a></li>
      <li><a href="#">Books</a></li>
      <li><a href="#">For Fans</a></li>
      <li><a href="#">News</a></li>
      <li><a href="#">Merchandise</a></li>

    </ul>

    <div class="flex-container">
      <img id="fireBlood" src="../../images/FireBlood.jpeg" alt="">
    </div>

    <div class="flex-container">
      <img id="flex-item-left" src="../../images/Cocteau.jpeg" alt="Cinema">
      <img id="flex-item-mid" src="../../images/Newsletter.png" alt="Newsletter">
      <img id="flex-item-right" src="../../images/DarkSword.jpeg" alt="DarkSword">
    </div>
  </body>
</html>
