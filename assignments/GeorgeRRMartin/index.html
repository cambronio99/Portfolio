<!DOCTYPE html>
<html lang="en-US">
  <head>
    <style>

      @font-face {
        font-family: "kingman";
        src: url("../../fonts/Kingman-Regular.otf") format("opentype");
      }

      body {
        background-image: url("../../images/marble.png");
        background-size: 2200px;
        background-repeat: none;
      }

      h1 {
        font-family: kingman;
        font-size: 70px;
        text-shadow: 0px 5px lightgrey;
        text-align: center;
      }



      .flex-container {
        display: flex;
        flex-direction: row;
        margin: 10px;
        justify-content: center;
      }

      #flex-item-left {
        flex: 1;
        border: 5px solid #671F28;
        max-width: 450px;
        margin-right: 40px
      }

      #flex-item-mid {
        flex: 1;
        border: 5px solid #0D0D0D;
        max-width: 450px
      }

      #flex-item-right {
        flex: 1;
        border: 5px solid #671F28;
        max-width: 450px;
        margin-left: 40px
      }

      #fireBlood {
        flex: 1;
        border: 5px solid white;
      }

      @media (max-width: 1080px) {
        .flex-container {
          flex-direction: column;
          justify-content: center;
        }

        #flex-item-left {
          margin-left: 200px;
          margin-right: 200px;
          max-width: none
        }

        #flex-item-mid {
          margin-left: 200px;
          margin-right: 200px;
          max-width: none;
        }

        #flex-item-right {
          margin-left: 200px;
          margin-right: 200px;
          max-width: none
        }
      }

      @media (max-width: 738px) {
        #flex-item-left {
          margin: auto;
        }

        #flex-item-mid {
          margin: auto;
        }

        #flex-item-right {
          margin: auto;
        }
      }




    </style>

    <title>George R.R. Martin</title>
  </head>

  <body>
    <h1>George R.R. Martin</h1>

    <div class="flex-container">
      <img id="fireBlood" src="../../images/FireBlood.jpeg" alt="">
    </div>

    <div class="flex-container">
      <img id="flex-item-left" src="../../images/Cocteau.jpeg" alt="Cinema">
      <img id="flex-item-mid" src="../../images/Newsletter.png" alt="Newsletter">
      <img id="flex-item-right" src="../../images/DarkSword.jpeg" alt="DarkSword">
    </div>
  </body>
</html>
