<!DOCTYPE html>
<html lang="en-US">
  <head>
    <title>HELLO WORLD</title>
    <style>
      @font-face {
        font-family: "akira";
        src: url("../fonts/akira.otf");
      }
      body {
        margin: 0;
        font-family: akira;
        color: white;
        font-size: 20px;
        background-color: black
      }
      h1 {
        text-align: center;
        margin-top: 60px
      }
      #hero {
        align-items: center;
        background-color: black;
        display: flex;
        height: 300px;
        justify-content: center;
      }
      #countdown {
        display: inline-block;
      }
      img {
        display: block;
        margin-left: auto;
        margin-right: auto;
        width: 50%;
        margin-top: 100px
      }
    </style>
  </head>
  <body>
      <h1>Graduation Countdown</h1>
    <div id="hero">
      <h1 id="countdown">Loading . . .</h1>
    </div>
    <script type="text/javascript">
      let deadline = new Date('July 22, 2022 16:30:00');

      function setCountdown() {
        let now = new Date();

        // # of milliseconds between deadline and now
        let timeLeft = deadline.getTime() - now.getTime();

        let days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));

        let hours = Math.floor(
          (timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
        );
        var minutes = Math.floor(
          (timeLeft % (1000 * 60 * 60)) / (1000 * 60)
        );
        var seconds = Math.floor(
          (timeLeft % (1000 * 60)) / 1000
        );

        document.getElementById('countdown').innerHTML =
          days + ' days ' + hours + ' hours ' + minutes + ' minutes '
            + seconds + ' seconds ';
      }

      setInterval(setCountdown, 1000);
    </script>

      <img src="../images/white.png" alt="">
  </body>
</html>
