<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Internal CSS Example</title>
    <style media="screen">
      div {
        color: red;
        font-size: 48px;
      }

      #firstdiv {
        color: blue;
      }

      .highlight{
        background-color: yellow;
      }

      .card {
        border-radius: 24px;
        box-shadow: 10px 10px 12px 4px rgba(0, 0, 0, 0.5);
        margin: 24px;
        margin-bottom: 48px;
        padding: 36px
      }

    </style>
  </head>
  <body>
    <div id="firstdiv">
      This is my first internally styled div

      </div>
    <div>
      This is another internally styled div
    </div>
    <div class="highlight card">
   This is another div
 </div>
   <div class="highlight">
     This is another div

  </body>
</html>
